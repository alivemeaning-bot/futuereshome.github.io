<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>专属寄语</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@fluentui/web-components"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 轮播背景容器 */
        .bg-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .bg-slider img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: slideBg 20s infinite;
        }

        /* 轮播淡入淡出 */
        @keyframes slideBg {
            0% {
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            45% {
                opacity: 1;
            }

            55% {
                opacity: 0;
            }

            100% {
                opacity: 0;
            }
        }

        /* 3张图轮播时间 */
        .bg-slider img:nth-child(1) {
            animation-delay: 0s;
        }

        .bg-slider img:nth-child(2) {
            animation-delay: 5s;
        }

        .bg-slider img:nth-child(3) {
            animation-delay: 10s;
        }

        body::before {
            content: "";
            position: fixed;
            left: 0;
            top: 0;
            width: 18%;
            height: 100vh;
            background: rgba(255, 255, 255, 0.35);
            z-index: 1;
        }

        body::after {
            content: "";
            position: fixed;
            right: 0;
            top: 0;
            width: 18%;
            height: 100vh;
            background: rgba(255, 255, 255, 0.35);
            z-index: 1;
        }

        @media (max-width:768px) {

            body::before,
            body::after {
                display: none;
            }
        }

        .login-box {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 12px;
            position: relative;
            z-index: 2;
        }

        .item-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 280px;
        }

        .glass-inp {
            flex: 1;
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            outline: none;
            color: #fff;
            font-size: 14px;
        }

        .pwd-love {
            color: transparent;
            text-shadow: 0 0 0 #ff4477;
            letter-spacing: 3px;
        }

        .sub-btn {
            width: 100%;
            max-width: 280px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 68, 119, 0.4);
            border: 1px solid #ff4477;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        #cardContainer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
            z-index: 99;
        }

        /* 爱心上浮 */
        .love {
            position: fixed;
            bottom: 0;
            font-size: 24px;
            color: #ff4477;
            pointer-events: none;
            animation: rise 4s linear forwards;
            z-index: 999;
        }

        @keyframes rise {
            0% {
                transform: translateY(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }

        /* 随机祝福小卡片 */
        .pop-card-text {
            position: fixed;
            padding: 10px 18px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ff4477;
            font-weight: bold;
            font-size: 15px;
            pointer-events: none;
            animation: popFade 3s ease-out forwards;
            z-index: 9999;
        }

        @keyframes popFade {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(1.1);
            }
        }
    </style>
</head>

<body>
    <audio id="bgMusic" loop preload="auto">
        <source src="mus/obj_w5rDlsOJwrLDjj7CmsOj_77832928998_f377_5e71_ba7e_2dafe3b653ff31b646531472f04b1d01.m4a"
            type="audio/mpeg">
    </audio>
    <!-- 轮播背景 -->
    <div class="bg-slider">
        <img src="image/seWM.jpg">
        <img src="image/THRWM.jpg">
        <img src="image/FOURWM.jpg">
    </div>

    <!-- 登录 -->
    <div class="login-box" id="loginPage">
        <div class="item-row">
            <input class="glass-inp" id="acc" type="text" placeholder="输入账号">
        </div>
        <div class="item-row">
            <input class="glass-inp pwd-love" id="pwd" type="password" placeholder="输入密码">
        </div>
        <button class="sub-btn" onclick="goCard()">点击查看</button>
    </div>

    <!-- 卡片 -->
    <div id="cardContainer">
        <fluent-card style="
            width:100%;max-width:300px;padding:20px;text-align:center;line-height:1.6;font-size:13px;
            background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.3);
        ">
            今天，是一个特别的日子，也就是别人口中所谓的520情人节。<br>
            感谢你的陪伴和支持。<br>
            为此我特定做了一个静态网站。<br>
            抱歉哦，我对你这么敏感还老是生气，性格真不好。<br>
            我会尽量平和告诉你心情，学着大度一点，谢谢宝宝的理解<br>
            我好害怕失去你，虽然我看着年龄很成熟内心却很脆弱呢~<br>
            每天想着害怕关系变淡，害怕惹你离开，什么什么的<br>
            不想再胡思乱想了，愿往后日日欢声笑语<br>
            谢谢你<br><br>

            <div style="font-size:15px;font-weight:bold;color:#ff4477;">
                愿你天天开心 ❤️<br>
                梅宝❤️喜欢你~❤️<br><br>
            </div>
            <button class="sub-btn" id="changeBtn" onclick="showBless()">请您再点击一下~</button>
        </fluent-card>
    </div>

    <script>
        const rightAcc = "Mei";
        const rightPwd = "Cap0102";

        function goCard() {
            let a = document.getElementById("acc").value.trim();
            let p = document.getElementById("pwd").value.trim();
            if (a === rightAcc && p === rightPwd) {
                document.getElementById("loginPage").style.display = "none";
                document.getElementById("cardContainer").style.display = "flex";
                startLove();
            } else {
                alert("账号或密码错误");
            }
        }

        // 爱心上浮
        function startLove() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    let l = document.createElement("div");
                    l.className = "love";
                    l.innerText = "❤️";
                    l.style.left = Math.random() * 100 + "vw";
                    l.style.animationDuration = (3 + Math.random() * 2) + "s";
                    document.body.appendChild(l);
                    setTimeout(() => l.remove(), 5000);
                }, i * 80);
            }
        }

        // 祝福
        const blessArr = [
            "爱你", "天天开心", "平安喜乐", "万事顺遂",
            "满心欢喜", "岁岁平安", "满眼是你", "岁岁相伴"
        ];

        function showBless() {
            for (let i = 0; i < 16; i++) {
                setTimeout(() => {
                    let box = document.createElement("div");
                    box.className = "pop-card-text";
                    box.innerText = blessArr[Math.floor(Math.random() * blessArr.length)];
                    box.style.left = Math.random() * 88 + "vw";
                    box.style.top = Math.random() * 88 + "vh";
                    document.body.appendChild(box);
                    setTimeout(() => box.remove(), 3000);
                }, i * 100);
            }
            setTimeout(() => {
                document.getElementById("changeBtn").innerText = "最喜欢你了~";
            }, 2000);
        }
        window.onclick = function () {
            let music = document.getElementById('bgMusic');
            if (music.paused) {
                music.volume = 0.6;
                music.play();
            }
        }

    </script>
</body>

</html>

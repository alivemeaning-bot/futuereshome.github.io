<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>注册成功</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="text-center text-success mb-4">注册成功 恭喜您注册成功</h3>
                    
                    <table class="table table-bordered text-center">
                        <tr>
                            <td>用户名</td>
                            <td id="username"></td>
                        </tr>
                        <tr>
                            <td>性别</td>
                            <td id="gender"></td>
                        </tr>
                        <tr>
                            <td>手机号</td>
                            <td id="phone"></td>
                        </tr>
                    </table>

                    <div class="d-grid gap-2 mt-4">
                        <a href="index.html" class="btn btn-outline-primary">返回首页</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
document.getElementById("username").innerText = urlParams.get("username");
document.getElementById("gender").innerText = urlParams.get("gender");
document.getElementById("phone").innerText = urlParams.get("phone");
</script>

</body>
</html>
